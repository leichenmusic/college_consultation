<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google登录测试 - 蕾拉酱</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d1b69 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .google-btn {
            background: #ffffff;
            color: #333333;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }
        
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ff6b6b;
        }
        
        .info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid rgba(33, 150, 243, 0.3);
            color: #2196F3;
        }
        
        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        
        .nav-links {
            margin-top: 30px;
        }
        
        .nav-links a {
            color: rgba(155, 89, 182, 0.8);
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            border: 1px solid rgba(155, 89, 182, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-links a:hover {
            color: #9b59b6;
            background: rgba(155, 89, 182, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Google登录测试</h1>
        
        <div class="test-section">
            <h3>测试1: Google登录按钮</h3>
            <p>点击下面的按钮测试Google登录功能：</p>
            
            <div id="g_id_onload"
                 data-client_id="441811058259-avff65f7m0h9qhcgvd3ue7fgdnhqv5ek.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleSignin"
                 data-auto_prompt="false">
            </div>
            
            <button class="google-btn" onclick="triggerGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                使用 Google 登录
            </button>
            
            <div id="login-result"></div>
        </div>
        
        <div class="test-section">
            <h3>测试2: 后端认证测试</h3>
            <p>测试获取到的token是否能被后端正确处理：</p>
            <button class="google-btn" onclick="testBackendAuth()" id="backend-test-btn" disabled>
                测试后端认证 (需要先登录)
            </button>
            <div id="backend-result"></div>
        </div>
        
        <div class="nav-links">
            <a href="http://localhost:5001/register">注册页面</a>
            <a href="http://localhost:5001/login">登录页面</a>
            <a href="http://localhost:5001/chat">聊天页面</a>
        </div>
    </div>
    
    <script>
        let currentToken = null;
        
        // Google登录回调函数
        function handleGoogleSignin(response) {
            console.log('Google登录响应:', response);
            currentToken = response.credential;
            
            // 解析JWT token (仅用于显示，实际验证在后端)
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                
                const resultDiv = document.getElementById('login-result');
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h4>✅ Google登录成功！</h4>
                        <p><strong>用户信息:</strong></p>
                        <pre>${JSON.stringify({
                            name: payload.name,
                            email: payload.email,
                            picture: payload.picture,
                            sub: payload.sub
                        }, null, 2)}</pre>
                        <p><strong>Token (前50字符):</strong></p>
                        <pre>${response.credential.substring(0, 50)}...</pre>
                    </div>
                `;
                
                // 启用后端测试按钮
                document.getElementById('backend-test-btn').disabled = false;
                
            } catch (error) {
                const resultDiv = document.getElementById('login-result');
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>❌ 解析token失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 触发Google登录
        function triggerGoogleLogin() {
            // Google Identity Services会自动处理登录
            console.log('触发Google登录...');
        }
        
        // 测试后端认证
        async function testBackendAuth() {
            if (!currentToken) {
                alert('请先进行Google登录');
                return;
            }
            
            const resultDiv = document.getElementById('backend-result');
            resultDiv.innerHTML = `
                <div class="result info">
                    <h4>🔄 正在测试后端认证...</h4>
                </div>
            `;
            
            try {
                const response = await fetch('http://localhost:5001/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: currentToken })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h4>✅ 后端认证成功！</h4>
                            <p><strong>消息:</strong> ${result.message}</p>
                            <p><strong>重定向URL:</strong> ${result.redirect}</p>
                            <p>🎉 Google OAuth登录功能完全正常！</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h4>❌ 后端认证失败</h4>
                            <p><strong>错误消息:</strong> ${result.message}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>❌ 请求失败</h4>
                        <p><strong>错误:</strong> ${error.message}</p>
                        <p>请确保Flask应用正在运行 (python app.py)</p>
                    </div>
                `;
            }
        }
        
        // 页面加载完成后的初始化
        window.onload = function() {
            console.log('Google登录测试页面已加载');
            
            // 检查Google Identity Services是否加载
            if (typeof google !== 'undefined') {
                console.log('✅ Google Identity Services已加载');
            } else {
                console.log('❌ Google Identity Services未加载');
            }
        };
    </script>
</body>
</html>
